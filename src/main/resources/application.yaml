spring:
  datasource:
    url: jdbc:mysql://localhost:3306/usermanagementservice
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8081

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG

debug: true
jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000